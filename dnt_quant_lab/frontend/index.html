<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNT Quant Lab</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import Plotly.js for frontend chart rendering -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effect"></div>
    
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <h1 class="logo">DNT LAB</h1>
            <p class="subtitle" data-i18n="subtitle">AI Investment Advisor</p>
            
            <div style="margin-bottom: 25px;">
                <select id="lang-selector" class="glass-input" style="width: 100%; cursor: pointer;">
                    <option value="en">🇺🇸 English (EN)</option>
                    <option value="vi">🇻🇳 Tiếng Việt (VI)</option>
                </select>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-i18n="nav_opt">Portfolio Optimizer</a>
                <a href="#" class="nav-item" data-i18n="nav_backtest">Backtesting</a>
                <a href="#" class="nav-item" data-i18n="nav_ai">AI Advisor</a>
            </nav>
            
            <div class="user-inputs">
                <h3 data-i18n="params_title">Investment Parameters</h3>
                <div class="input-group">
                    <label data-i18n="label_capital">Initial Capital (VND)</label>
                    <input type="number" id="capital-input" placeholder="e.g. 1,000,000,000" class="glass-input" data-i18n-ph="ph_capital">
                </div>
                <div class="input-group">
                    <label data-i18n="label_return">Target Return (%)</label>
                    <input type="number" id="target-return" placeholder="20%" class="glass-input">
                </div>
                <button class="action-btn" id="run-btn" data-i18n="btn_run">Run Simulation</button>
            </div>
            
            <p class="footer-text">Engineered by Doan Nguyen Tri</p>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav glass-panel">
                <h2 data-i18n="main_title">Portfolio Status</h2>
                <div class="status-indicator">
                    <span class="status-dot green"></span>
                    <span id="api-status" data-i18n="status_connected">Server Connected</span>
                </div>
            </header>
            
            <div class="bento-grid">
                <!-- Data Card -->
                <div class="card glass-panel span-2">
                    <h3 data-i18n="chart_title">Efficient Frontier (Demo)</h3>
                    <p class="caption" data-i18n="chart_desc">High-performance charts rendered natively via Python API.</p>
                    <div id="chart-container" style="width: 100%; height: 350px;">
                        <!-- Plotly chart will be injected here -->
                    </div>
                </div>
                
                <!-- Metric Cards -->
                <div class="card glass-panel metric-card">
                    <h4 data-i18n="metric_proj">Projected Value</h4>
                    <h2 class="neon-text" id="display-capital">0₫</h2>
                </div>
                <div class="card glass-panel metric-card">
                    <h4 data-i18n="metric_risk">Max Risk (VaR)</h4>
                    <h2 class="neon-alert" id="display-risk">-5.2%</h2>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
